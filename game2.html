<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL 英雄局部猜謎</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a1428; /* LoL 客戶端深藍底色 */
      color: #f0e6d2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      background-color: #1e2328;
      border: 2px solid #c8aa6e;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    /* 核心魔法：局部圖片顯示區塊 */
    .partial-image-box {
      width: 250px;
      height: 250px;
      margin: 20px auto;
      border: 3px solid #785a28;
      border-radius: 50%; /* 圓形遮罩，更有遊戲頭像感 */
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
      
      /* 設定背景圖放大 4 倍，藉此達到局部效果 */
      background-size: 400%; 
      background-repeat: no-repeat;
      transition: background-position 0.5s ease;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 25px;
    }
    button {
      background-color: #1e282d;
      color: #c8aa6e;
      border: 1px solid #c8aa6e;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background-color: #c8aa6e;
      color: #111;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .score-display {
      font-size: 28px;
      color: #c8aa6e;
      margin: 20px 0;
      font-weight: bold;
    }
    .answer-feedback {
      height: 24px;
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
    .correct { color: #00ff00; }
    .wrong { color: #ff4444; }
  </style>
</head>
<body>

<div id="app">
  <div class="game-container">
    <h2>英雄局部猜謎</h2>
    
    <div v-if="loading">
      <p>正在載入美術圖...</p>
    </div>

    <div v-else-if="isGameOver">
      <h3>挑戰結束！</h3>
      <div class="score-display">最終分數：{{ score }} / 50</div>
      <button @click="startGame" style="width: 100%; margin-top: 20px;">重新挑戰</button>
    </div>

    <div v-else>
      <div style="color: #a09b8c;">第 {{ currentQuestionIndex + 1 }} / 5 題 | 分數：{{ score }}</div>
      
      <!-- 動態綁定背景圖片與位置 -->
      <div 
        class="partial-image-box" 
        :style="{ 
          backgroundImage: `url(${currentQuestion.imageUrl})`,
          backgroundPosition: currentQuestion.focusPosition 
        }"
      ></div>
      
      <div class="options-grid">
        <button 
          v-for="(option, index) in currentQuestion.options" 
          :key="index"
          @click="selectOption(option)"
          :disabled="isAnswering"
        >
          {{ option }}
        </button>
      </div>

      <!-- 答題回饋 -->
      <div class="answer-feedback" :class="{ correct: isCorrect, wrong: isCorrect === false }">
        {{ feedbackMessage }}
      </div>
    </div>
  </div>
</div>

<script>
  const { createApp, ref, computed, onMounted } = Vue;

  // ★★★ 替換為你的第二支 GAS 部署網址 ★★★
  const GAS_API_URL = '你的_GAS_網頁應用程式網址_貼在這裡';

  createApp({
    setup() {
      const questions = ref([]);
      const currentQuestionIndex = ref(0);
      const score = ref(0);
      const loading = ref(true);
      const isGameOver = ref(false);
      const isAnswering = ref(false);
      
      const isCorrect = ref(null);
      const feedbackMessage = ref('');

      const currentQuestion = computed(() => questions.value[currentQuestionIndex.value] || {});

      const fetchQuestions = async () => {
        try {
          loading.value = true;
          const response = await fetch(`${GAS_API_URL}?game=ImageGame&t=${new Date().getTime()}`);
          const result = await response.json();
          
          if (result.status === 'success') {
            questions.value = result.data;
            // 預載圖片，避免切題時閃爍
            questions.value.forEach(q => {
              const img = new Image();
              img.src = q.imageUrl;
            });
          }
        } catch (error) {
          console.error('API 請求錯誤:', error);
          alert('讀取失敗，請確認 GAS 網址。');
        } finally {
          loading.value = false;
        }
      };

      const startGame = async () => {
        isGameOver.value = false;
        score.value = 0;
        currentQuestionIndex.value = 0;
        isCorrect.value = null;
        feedbackMessage.value = '';
        await fetchQuestions();
      };

      const selectOption = (selected) => {
        isAnswering.value = true;
        const correctAnswer = currentQuestion.value.answer;
        
        if (selected === correctAnswer) {
          score.value += 10;
          isCorrect.value = true;
          feedbackMessage.value = '答對了！';
        } else {
          isCorrect.value = false;
          feedbackMessage.value = `答錯了！正確答案是：${correctAnswer}`;
        }

        setTimeout(() => {
          isCorrect.value = null;
          feedbackMessage.value = '';
          
          if (currentQuestionIndex.value < 4) {
            currentQuestionIndex.value++;
          } else {
            isGameOver.value = true;
          }
          isAnswering.value = false;
        }, 1200); // 延長一點時間讓玩家看清楚正確答案
      };

      onMounted(() => {
        startGame();
      });

      return {
        loading,
        isGameOver,
        score,
        currentQuestionIndex,
        currentQuestion,
        isAnswering,
        isCorrect,
        feedbackMessage,
        startGame,
        selectOption
      };
    }
  }).mount('#app');
</script>

</body>
</html>
