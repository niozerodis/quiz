<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書房密室逃脫</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a1428;
            color: #f0e6d2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(rgba(10, 20, 40, 0.9), rgba(10, 20, 40, 0.95));
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #c8aa6e;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #c8aa6e;
            padding: 8px 15px;
            border-radius: 6px;
            transition: all 0.3s;
            background-color: rgba(200, 170, 110, 0.1);
        }
        .back-btn:hover {
            background-color: #c8aa6e;
            color: #0a1428;
        }

        #game-container {
            background-color: #1e2328;
            padding: 40px;
            border-radius: 12px;
            width: 90%;
            max-width: 650px;
            border: 2px solid #9b2d43;
            box-shadow: 0 0 30px rgba(155, 45, 67, 0.2);
        }
        h1 {
            text-align: center; color: #ff4d6d;
            letter-spacing: 2px; margin-top: 0; margin-bottom: 20px;
            border-bottom: 1px solid #785a28; padding-bottom: 15px;
        }
        #story-text {
            min-height: 110px; margin-bottom: 30px;
            line-height: 1.6; font-size: 16px; color: #c8aa6e;
            background: #111; padding: 15px; border-radius: 6px;
            border-left: 4px solid #785a28;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        button {
            background-color: #111; color: #f0e6d2;
            border: 1px solid #785a28; border-radius: 6px;
            padding: 12px 18px; cursor: pointer; font-size: 15px;
            transition: all 0.3s ease; flex: 1; min-width: 120px;
        }
        button:hover { background-color: #2d333b; border-color: #c8aa6e; transform: translateY(-2px); }
        
        .panel { 
            display: none; margin-top: 20px; 
            border-top: 1px dashed #785a28; padding-top: 20px; 
        }
        input {
            background-color: #0a1428; color: #00e5ff;
            border: 1px solid #008899; padding: 12px;
            font-size: 16px; border-radius: 4px; text-align: center;
            letter-spacing: 2px; width: 140px;
        }
        .submit-btn { background-color: #005566; border-color: #00e5ff; margin-left: 10px; flex: none; }
        .submit-btn:hover { background-color: #008899; }
        b { color: #ffb067; }
        .hint { font-style: italic; color: #a09b8c; }
    </style>
</head>
<body>

<a href="./index.html" class="back-btn">⬅ 返回大廳</a>

<div id="game-container">
    <h1>🚪 書房密室逃脫</h1>
    <div id="story-text">你醒來發現自己被反鎖在一間昏暗的書房裡。四周只有一個書架、一張書桌、牆上的四個掛鐘，以及一扇帶著電子鎖的厚重鐵門。</div>
    
    <div class="btn-group">
        <button onclick="investigate('clocks')">🕒 調查掛鐘</button>
        <button onclick="investigate('bookshelf')">📚 調查書架</button>
        <button onclick="investigate('desk')">📝 調查書桌</button>
        <button onclick="investigate('door')">🚪 檢查大門</button>
    </div>

    <div id="box-panel" class="panel">
        <p>請輸入木盒上的四位數密碼：</p>
        <input type="text" id="box-input" maxlength="4" placeholder="輸入四位數">
        <button onclick="unlockBox()" class="submit-btn">嘗試開啟</button>
    </div>

    <div id="door-panel" class="panel">
        <p>鐵門電子鎖，請輸入最終三位數逃脫密碼：</p>
        <input type="text" id="password-input" maxlength="3" placeholder="輸入三位數">
        <button onclick="unlockDoor()" id="submit-btn" class="submit-btn">驗證解鎖</button>
        <p id="loading-msg" style="display:none; color: #ffb067; margin-top: 10px;">驗證中，請稍候...</p>
    </div>
</div>

<script>
    // ★★★ 將這裡的 URL 替換成你部署的 Router.gs Web App 網址 ★★★
    const API_URL = "https://script.google.com/macros/s/AKfycby1BWBCxXutXojI4jAGU4E42xXu7ExIF35bec-Y9WNCkIRr8XHmrZWEGaFuQgKzr155/exec";

    const storyEl = document.getElementById('story-text');
    const doorPanel = document.getElementById('door-panel');
    const boxPanel = document.getElementById('box-panel');

    let inventory = {
        hasGlasses: false // 是否取得「紅色濾光鏡」
    };

    function hideAllPanels() {
        doorPanel.style.display = 'none';
        boxPanel.style.display = 'none';
    }

    function investigate(target) {
        hideAllPanels();
        
        switch(target) {
            case 'clocks':
                // 完全移除提示，只保留客觀的指針位置描述
                storyEl.innerHTML = "牆上並排掛著四個古董時鐘，每一個都只有時針和分針。滴答聲早已停止，指針僵死在固定的刻度上：<br><br>第一個：時針指著 <b>IX</b>，分針指著 <b>VII</b><br>第二個：時針指著 <b>XII</b>，分針指著 <b>VI</b><br>第三個：時針指著 <b>XII</b>，分針指著 <b>VI</b><br>第四個：時針指著 <b>IX</b>，分針指著 <b>VII</b>";
                break;
            
            case 'bookshelf':
                if (inventory.hasGlasses) {
                    storyEl.innerHTML = "木盒已經被你打開了，裡面空無一物。你已經仔細檢查過書架，沒有其他可用的線索了。";
                } else {
                    storyEl.innerHTML = "書架上擺滿了厚重的精裝書。你在中層發現了一個上了鎖的精緻木盒，上面扣著一個需要輸入<b>四位數密碼</b>的機關鎖。";
                    boxPanel.style.display = 'block';
                }
                break;
            
            case 'desk':
                if (inventory.hasGlasses) {
                    storyEl.innerHTML = "你戴上剛剛獲得的「紅色濾光鏡」再次查看那張圖紙。<br>原本雜亂的紅色干擾線條在鏡片下隱形了！底下隱藏的藍色筆跡清晰地浮現出三個數字：<b>「1」、「8」、「5」</b>。<br><span class='hint'>紙張右下角還寫著提示：『唯有將數字<b>由大至小</b>排列，方能引領你走向自由。』</span>";
                } else {
                    storyEl.innerHTML = "書桌上平放著一張圖紙，上面佈滿了紅色與藍色重疊交錯的凌亂線條。紅色的墨水過於濃烈且雜亂無章，嚴重干擾了視線，完全看不出裡面是否藏著什麼訊息。";
                }
                break;
            
            case 'door':
                storyEl.innerHTML = "這是一扇厚重的鐵門，門把上方嵌著一個電子密碼盤，螢幕上閃爍著紅光，要求輸入<b>三位數的最終密碼</b>才能解鎖。";
                doorPanel.style.display = 'block';
                break;
        }
    }

    // 書架木盒解謎邏輯 (前端驗證)
    function unlockBox() {
        const boxCode = document.getElementById('box-input').value;
        // 密碼邏輯：形狀 7, 1, 1, 7 => 7117
        if (boxCode === '7117') {
            inventory.hasGlasses = true;
            hideAllPanels();
            storyEl.innerHTML = "「咔嗒！」密碼正確，木盒的鎖扣彈開了。<br>你在裡面找到了一副造型特殊的<b>「紅色濾光鏡」</b>。或許這個道具能幫你看清某些隱藏在混亂中的事物。";
        } else {
            storyEl.innerHTML = "鎖頭紋風不動。密碼錯誤，看來你需要參透牆上時鐘指針所隱含的意義。";
        }
        document.getElementById('box-input').value = ''; 
    }

    // 大門解謎邏輯 (呼叫後端 API)
    function unlockDoor() {
        const code = document.getElementById('password-input').value;
        const btn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading-msg');

        if(code.length !== 3) {
            alert("請輸入三位數密碼！");
            return;
        }

        btn.style.display = 'none';
        loading.style.display = 'block';

        const requestUrl = `${API_URL}?game=EscapeQuestion&code=${code}`;

        fetch(requestUrl)
        .then(response => response.json())
        .then(res => {
            btn.style.display = 'inline-block';
            loading.style.display = 'none';

            if (res.status === 'success') {
                const gameData = res.data; 
                storyEl.innerHTML = gameData.message;
                
                if(gameData.success) {
                    document.querySelector('.btn-group').style.display = 'none';
                    doorPanel.style.display = 'none';
                    storyEl.style.color = '#00e5ff';
                    storyEl.style.borderColor = '#00e5ff';
                    storyEl.style.fontSize = '18px';
                    storyEl.style.textAlign = 'center';
                }
            } else {
                alert("後端發生錯誤：" + res.message);
            }
        })
        .catch(error => {
            btn.style.display = 'inline-block';
            loading.style.display = 'none';
            alert("伺服器連線失敗，請稍後再試！");
            console.error("Error:", error);
        });
    }
</script>

</body>
</html>
