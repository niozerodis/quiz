<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Emoji 猜謎遊戲</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1c23;
      color: #f0f6fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      background-color: #2d333b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .emoji-display {
      font-size: 48px;
      margin: 20px 0;
      letter-spacing: 10px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }
    button {
      background-color: #c8aa6e; /* 英雄聯盟經典金色 */
      color: #111;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background-color: #f0e6d2;
      transform: translateY(-2px);
    }
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
      transform: none;
    }
    .status-text {
      color: #8b949e;
      margin-bottom: 10px;
    }
    .score-display {
      font-size: 24px;
      color: #58a6ff;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="game-container">
    <h2>LoL Emoji 猜謎</h2>
    
    <!-- 載入中狀態 -->
    <div v-if="loading">
      <p>正在召喚峽谷資料...</p>
    </div>

    <!-- 遊戲結束畫面 -->
    <div v-else-if="isGameOver">
      <h3>遊戲結束！</h3>
      <div class="score-display">你的分數：{{ score }} / 50</div>
      <p>{{ resultMessage }}</p>
      <button @click="startGame" style="width: 100%; margin-top: 15px;">再玩一次</button>
    </div>

    <!-- 遊戲進行中畫面 -->
    <div v-else>
      <div class="status-text">第 {{ currentQuestionIndex + 1 }} / 5 題</div>
      <div class="status-text">目前分數：{{ score }}</div>
      
      <div class="emoji-display">
        {{ currentQuestion.emoji }}
      </div>
      
      <div class="options-grid">
        <button 
          v-for="(option, index) in currentQuestion.options" 
          :key="index"
          @click="selectOption(option)"
          :disabled="isAnswering"
        >
          {{ option }}
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const { createApp, ref, computed, onMounted } = Vue;

  // 替換為你的 Google Apps Script 部署網址
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycby1BWBCxXutXojI4jAGU4E42xXu7ExIF35bec-Y9WNCkIRr8XHmrZWEGaFuQgKzr155/exec';

  createApp({
    setup() {
      const questions = ref([]);
      const currentQuestionIndex = ref(0);
      const score = ref(0);
      const loading = ref(true);
      const isGameOver = ref(false);
      const isAnswering = ref(false);

      const currentQuestion = computed(() => questions.value[currentQuestionIndex.value] || {});

      const resultMessage = computed(() => {
        if (score.value === 50) return '太神啦！Faker 是你？';
        if (score.value >= 30) return '表現不錯，大師階級的觀察力！';
        return '看來你還需要多打幾場積分喔！';
      });

      const fetchQuestions = async () => {
        try {
          loading.value = true;
          // 加上時間戳防止快取
          const response = await fetch(`${GAS_API_URL}?t=${new Date().getTime()}`);
          const result = await response.json();
          
          if (result.status === 'success') {
            questions.value = result.data;
          } else {
            console.error('獲取題目失敗:', result.message);
            alert('讀取題目失敗，請檢查 API。');
          }
        } catch (error) {
          console.error('API 請求錯誤:', error);
          alert('網路錯誤，請確認 GAS 部署網址是否正確。');
        } finally {
          loading.value = false;
        }
      };

      const startGame = async () => {
        isGameOver.value = false;
        score.value = 0;
        currentQuestionIndex.value = 0;
        await fetchQuestions();
      };

      const selectOption = (selected) => {
        isAnswering.value = true;
        const correctAnswer = currentQuestion.value.answer;
        
        if (selected === correctAnswer) {
          // 答對加 10 分
          score.value += 10;
        }

        // 短暫延遲讓玩家看到結果再進入下一題
        setTimeout(() => {
          if (currentQuestionIndex.value < 4) {
            currentQuestionIndex.value++;
          } else {
            isGameOver.value = true;
          }
          isAnswering.value = false;
        }, 500);
      };

      onMounted(() => {
        startGame();
      });

      return {
        loading,
        isGameOver,
        score,
        currentQuestionIndex,
        currentQuestion,
        resultMessage,
        isAnswering,
        startGame,
        selectOption
      };
    }
  }).mount('#app');
</script>

</body>
</html>
