<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOL Emoji Quiz - Hextech</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root {
      --hex-gold: #c8aa6e;
      --hex-blue: #0ac8b9;
      --hex-dark: #091428;
      --hex-border: #785a28;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle, #0a1428 0%, #050a14 100%);
      color: #f0e6d2;
      display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
    }
    .game-container {
      background-color: #1e2328; border: 2px solid var(--hex-gold); padding: 30px;
      border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.8); width: 100%; max-width: 450px; text-align: center;
    }
    .display-area {
      height: 280px; display: flex; align-items: center; justify-content: center;
      margin: 20px 0; border: 1px solid var(--hex-border); background: #010a13; position: relative; overflow: hidden;
    }
    .emoji-text { font-size: 64px; letter-spacing: 8px; }
    .reveal-img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s ease; }
    .hero-name-overlay {
      position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7);
      color: var(--hex-gold); padding: 8px 0; font-weight: bold;
    }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      background: #1e282d; color: var(--hex-gold); border: 1px solid var(--hex-border);
      padding: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    button:hover:not(:disabled) { background: var(--hex-gold); color: #111; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .feedback { height: 30px; margin-top: 15px; font-size: 18px; font-weight: bold; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
<div id="app">
  <div class="game-container">
    <div v-if="loading">召喚中...</div>
    <div v-else-if="isGameOver">
      <h2>挑戰結束</h2>
      <div style="font-size: 32px; color: var(--hex-gold); margin: 20px 0;">{{ score }} / 50</div>
      <button @click="startGame" style="width:100%">再次進入峽谷</button>
    </div>
    <div v-else>
      <div style="color: #a09b8c;">ROUND {{ currentQuestionIndex + 1 }} / 5</div>
      <div class="display-area">
        <template v-if="isAnswering">
          <img :src="currentQuestion.imageUrl" class="reveal-img">
          <div class="hero-name-overlay">{{ currentQuestion.answer }}</div>
        </template>
        <div v-else class="emoji-text">{{ currentQuestion.emoji }}</div>
      </div>
      <div class="options-grid">
        <button v-for="opt in currentQuestion.options" @click="selectOption(opt)" :disabled="isAnswering">{{ opt }}</button>
      </div>
      <div class="feedback" :style="{ color: isCorrect ? '#00ff00' : '#ff4444' }">{{ feedbackMessage }}</div>
    </div>
  </div>
</div>
<script>
  const { createApp, ref, computed, onMounted } = Vue;
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycby1BWBCxXutXojI4jAGU4E42xXu7ExIF35bec-Y9WNCkIRr8XHmrZWEGaFuQgKzr155/exec';
  createApp({
    setup() {
      const questions = ref([]), currentQuestionIndex = ref(0), score = ref(0);
      const loading = ref(true), isGameOver = ref(false), isAnswering = ref(false);
      const isCorrect = ref(null), feedbackMessage = ref('');
      const currentQuestion = computed(() => questions.value[currentQuestionIndex.value] || {});
      const fetchQuestions = async () => {
        loading.value = true;
        const res = await fetch(`${GAS_API_URL}?game=EmojiGame&t=${Date.now()}`);
        const json = await res.json();
        questions.value = json.data;
        loading.value = false;
      };
      const selectOption = (opt) => {
        isAnswering.value = true;
        if (opt === currentQuestion.value.answer) {
          score.value += 10; isCorrect.value = true; feedbackMessage.value = '精準預測！';
        } else {
          isCorrect.value = false; feedbackMessage.value = `失誤！這是 ${currentQuestion.value.answer}`;
        }
        setTimeout(() => {
          isCorrect.value = null; feedbackMessage.value = '';
          if (currentQuestionIndex.value < 4) currentQuestionIndex.value++; else isGameOver.value = true;
          isAnswering.value = false;
        }, 2500);
      };
      const startGame = () => { isGameOver.value = false; score.value = 0; currentQuestionIndex.value = 0; fetchQuestions(); };
      onMounted(startGame);
      return { loading, isGameOver, score, currentQuestionIndex, currentQuestion, isAnswering, isCorrect, feedbackMessage, startGame, selectOption };
    }
  }).mount('#app');
</script>
</body>
</html>
