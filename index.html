<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carol 派對小遊戲集合</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a1428;
      color: #f0e6d2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-image: linear-gradient(rgba(10, 20, 40, 0.85), rgba(10, 20, 40, 0.95));
      box-sizing: border-box;
    }
    .lobby-container {
      text-align: center;
      background: #1e2328;
      border: 2px solid #c8aa6e;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(200, 170, 110, 0.15);
    }
    h1 {
      color: #c8aa6e;
      letter-spacing: 2px;
      margin-bottom: 40px;
      font-size: 32px;
      text-transform: uppercase;
    }
    .game-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .game-card {
      display: block;
      text-decoration: none;
      background-color: #111;
      border: 1px solid #785a28;
      padding: 20px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .game-card:hover {
      background-color: #2d333b;
      border-color: #c8aa6e;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .game-title {
      color: #f0e6d2;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .game-desc {
      color: #a09b8c;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="lobby-container">
    <h1>峽谷派對遊樂場</h1>
    
    <div class="game-links">
      <a href="./game1.html" class="game-card">
        <div class="game-title">🤔 Emoji 猜英雄</div>
        <div class="game-desc">透過幾個簡單的表情符號，猜出對應的英雄！</div>
      </a>

      <a href="./game2.html" class="game-card">
        <div class="game-title">🔍 美術圖局部猜謎</div>
        <div class="game-desc">放大檢視英雄美術圖的角落，考驗你的觀察力！</div>
      </a>

      <a href="./game3.html" class="game-card" style="border-color: #008899;">
        <div class="game-title" style="color: #00e5ff;">🌊 鳴潮角色 Emoji</div>
        <div class="game-desc">透過表情符號找出對應的鳴潮角色！</div>
      </a>

      <a href="./game4.html" class="game-card" style="border-color: #ffb067;">
        <div class="game-title" style="color: #ffb067;">🐾 貓咪舒壓拼圖</div>
        <div class="game-desc">點擊碎片進行串接交換，還原隨機出現的貓咪特寫！</div>
      </a>

      <a href="./game5.html" class="game-card" style="border-color: #9b2d43;">
        <div class="game-title" style="color: #ff4d6d;">🚪 書房密室逃脫</div>
        <div class="game-desc">調查周遭環境尋找線索，在五分鐘內解開密碼逃出生天！</div>
      </a>

      <a href="./game6.html" class="game-card" style="border-color: #008899;">
        <div class="game-title" style="color: #00e5ff;">✊✌️✋ 決戰阿布猜拳</div>
        <div class="game-desc">與鳴潮吉祥物「阿布」進行三戰兩勝的快速猜拳對決，看看誰的運氣更好！</div>
      </a>
    </div>
  </div>

</body>
</html>
